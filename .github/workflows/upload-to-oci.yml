name: Upload Latest Release to OCI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_RELEASE=$(gh release view --json tagName,assets --jq '{tag: .tagName, assets: [.assets[] | select(.name | test("\\.(zip|tar\\.gz)$")) | .name]}')
          TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag')
          ASSETS=$(echo "$LATEST_RELEASE" | jq -r '.assets[]')

          if [ -z "$ASSETS" ]; then
            echo "ERROR: No zip or tar.gz asset found in latest release"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest release: $TAG"
          echo "Assets:"
          echo "$ASSETS"

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./artifact
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern '*.zip' \
            --pattern '*.tar.gz' \
            --dir ./artifact || true

          # Verify something was downloaded
          if [ -z "$(ls ./artifact/*.{zip,tar.gz} 2>/dev/null)" ]; then
            echo "ERROR: No zip or tar.gz files found after download"
            ls -la ./artifact/
            exit 1
          fi

      - name: Extract QCOW2 artifacts
        run: |
          cd ./artifact

          # Extract .zip files
          for f in *.zip; do
            [ -f "$f" ] || continue
            echo "Extracting $f (zip)..."
            unzip -o "$f" '*.qcow2'
          done

          # Extract .tar.gz files
          for f in *.tar.gz; do
            [ -f "$f" ] || continue
            echo "Extracting $f (tar.gz)..."
            tar -xzf "$f" --wildcards --no-anchored '*.qcow2'
          done

          echo "--- Extracted QCOW2 files ---"
          find . -name '*.qcow2' -exec ls -lh {} \;

      - name: Configure AWS CLI for Oracle S3
        run: |
          aws configure set aws_access_key_id "${{ secrets.OCI_S3_ACCESS_KEY }}"
          aws configure set aws_secret_access_key "${{ secrets.OCI_S3_SECRET_KEY }}"
          aws configure set default.region "${{ secrets.OCI_S3_REGION }}"

      - name: Upload to Oracle S3
        env:
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          ENDPOINT="${{ secrets.OCI_S3_ENDPOINT }}"
          BUCKET="${{ secrets.OCI_S3_BUCKET }}"
          DEST_PREFIX="${{ secrets.OCI_S3_DEST_PREFIX }}"

          echo "Uploading QCOW2 images to Oracle S3..."
          echo "  Endpoint: $ENDPOINT"
          echo "  Bucket:   $BUCKET"
          echo "  Prefix:   ${DEST_PREFIX:-<root>}"

          find ./artifact -name '*.qcow2' | while read -r FILE; do
            FILENAME=$(basename "$FILE")

            if [ -n "$DEST_PREFIX" ]; then
              S3_KEY="${DEST_PREFIX}/${FILENAME}"
            else
              S3_KEY="${FILENAME}"
            fi

            echo "Uploading ${FILENAME} -> s3://${BUCKET}/${S3_KEY}"
            aws s3 cp "$FILE" "s3://${BUCKET}/${S3_KEY}" \
              --endpoint-url "$ENDPOINT" \
              --no-progress
          done

          echo "Upload complete."

      # --- Image Import Steps ---
      # Requires additional GitHub secrets:
      #   OCI_TENANCY_OCID       - OCID of your OCI tenancy
      #   OCI_USER_OCID          - OCID of the OCI user with compute image import permissions
      #   OCI_COMPARTMENT_OCID   - OCID of the compartment to import the image into
      #   OCI_API_KEY_PRIVATE    - PEM-formatted RSA private key for API authentication
      #   OCI_API_KEY_FINGERPRINT - Fingerprint of the API key
      #
      # The import steps only run when OCI_COMPARTMENT_OCID is set as a secret.

      - name: Install OCI CLI
        if: ${{ env.OCI_COMPARTMENT_OCID != '' }}
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          pip install oci-cli

      - name: Configure OCI CLI
        if: ${{ env.OCI_COMPARTMENT_OCID != '' }}
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          mkdir -p ~/.oci

          # Write OCI CLI config
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_API_KEY_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_S3_REGION }}
          key_file=~/.oci/oci_api_key.pem
          EOF

          # Write API private key
          echo "${{ secrets.OCI_API_KEY_PRIVATE }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Import image into OCI Compute
        if: ${{ env.OCI_COMPARTMENT_OCID != '' }}
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: |
          BUCKET="${{ secrets.OCI_S3_BUCKET }}"
          DEST_PREFIX="${{ secrets.OCI_S3_DEST_PREFIX }}"
          COMPARTMENT="${{ secrets.OCI_COMPARTMENT_OCID }}"
          ENDPOINT="${{ secrets.OCI_S3_ENDPOINT }}"
          TAG="${{ steps.release.outputs.tag }}"

          # Extract Object Storage namespace from the S3-compatible endpoint
          # Format: https://<namespace>.compat.objectstorage.<region>.oci.oraclecloud.com
          NAMESPACE=$(echo "$ENDPOINT" | sed -n 's|https://\([^.]*\).*|\1|p')

          if [ -z "$NAMESPACE" ]; then
            echo "ERROR: Could not extract Object Storage namespace from endpoint: $ENDPOINT"
            exit 1
          fi

          echo "Importing images into OCI Compute..."
          echo "  Namespace:   $NAMESPACE"
          echo "  Bucket:      $BUCKET"
          echo "  Compartment: $COMPARTMENT"

          find ./artifact -name '*.qcow2' | while read -r FILE; do
            FILENAME=$(basename "$FILE")

            if [ -n "$DEST_PREFIX" ]; then
              OBJECT_NAME="${DEST_PREFIX}/${FILENAME}"
            else
              OBJECT_NAME="${FILENAME}"
            fi

            DISPLAY_NAME="${FILENAME%.qcow2}-${TAG}"
            BASE_PREFIX="${FILENAME%.qcow2}-"

            # --- Delete old custom images matching this base name ---
            echo ""
            echo "Looking for old images matching '${BASE_PREFIX}*' in compartment..."
            OLD_IMAGES=$(oci compute image list \
              --compartment-id "$COMPARTMENT" \
              --lifecycle-state AVAILABLE \
              --all \
              --query "data[?starts_with(\"display-name\", '${BASE_PREFIX}')].{id: id, name: \"display-name\"}" \
              --output json 2>/dev/null || echo '[]')

            OLD_COUNT=$(echo "$OLD_IMAGES" | jq 'length')
            if [ "$OLD_COUNT" -gt 0 ]; then
              echo "Found ${OLD_COUNT} old image(s) to delete:"
              echo "$OLD_IMAGES" | jq -r '.[] | "  \(.name) (\(.id))"'
              echo "$OLD_IMAGES" | jq -r '.[].id' | while read -r OLD_ID; do
                echo "Deleting image $OLD_ID..."
                oci compute image delete --image-id "$OLD_ID" --force
              done
              echo "Old images deleted."
            else
              echo "No old images found to clean up."
            fi

            # --- Import the new image ---
            echo ""
            echo "Importing ${OBJECT_NAME} as '${DISPLAY_NAME}'..."

            echo "Waiting for image import to complete (this may take several minutes)..."

            IMAGE_ID=$(oci compute image import from-object \
              --bucket-name "$BUCKET" \
              --namespace "$NAMESPACE" \
              --name "$OBJECT_NAME" \
              --compartment-id "$COMPARTMENT" \
              --display-name "$DISPLAY_NAME" \
              --source-image-type QCOW2 \
              --launch-mode PARAVIRTUALIZED \
              --operating-system "Linux" \
              --operating-system-version "NixOS" \
              --wait-for-state AVAILABLE \
              --max-wait-seconds 1800 \
              --query 'data.id' \
              --raw-output)

            echo "Image ${DISPLAY_NAME} is now AVAILABLE."
            echo "  OCID: ${IMAGE_ID}"

            # --- Delete the QCOW2 from the bucket (no longer needed) ---
            echo "Deleting ${OBJECT_NAME} from bucket ${BUCKET}..."
            aws s3 rm "s3://${BUCKET}/${OBJECT_NAME}" \
              --endpoint-url "$ENDPOINT" \
              --no-progress
            echo "Bucket object deleted."
          done

          echo "All images imported and bucket cleaned up successfully."
