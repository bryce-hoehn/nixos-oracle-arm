name: Upload Latest Release to Oracle S3

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_RELEASE=$(gh release view --json tagName,assets --jq '{tag: .tagName, asset: (.assets[] | select(.name | endswith(".tar.gz")) | .url)}')
          TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag')
          ASSET_URL=$(echo "$LATEST_RELEASE" | jq -r '.asset')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "ERROR: No tar.gz asset found in latest release"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "Latest release: $TAG"
          echo "Asset URL: $ASSET_URL"

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern '*.tar.gz' \
            --dir ./artifact

      - name: Extract QCOW2 artifact (tar.gz)
        run: |
          cd ./artifact
          
          tar -xzf ./*.tar.gz --wildcards --no-anchored '*.qcow2'
          
          echo "--- Extracted QCOW2 files ---"
          find . -name '*.qcow2' -exec ls -lh {} \;
          
      - name: Configure AWS CLI for Oracle S3
        run: |
          aws configure set aws_access_key_id "${{ secrets.OCI_S3_ACCESS_KEY }}"
          aws configure set aws_secret_access_key "${{ secrets.OCI_S3_SECRET_KEY }}"
          aws configure set default.region "${{ secrets.OCI_S3_REGION }}"

      - name: Upload to Oracle S3
        run: |
          ENDPOINT="${{ secrets.OCI_S3_ENDPOINT }}"
          BUCKET="${{ secrets.OCI_S3_BUCKET }}"

          echo "Uploading QCOW2 images to Oracle S3..."
          echo "  Endpoint: $ENDPOINT"
          echo "  Bucket:   $BUCKET"

          find ./artifact -name '*.qcow2' | while read -r FILE; do
            FILENAME=$(basename "$FILE")

            echo "Uploading ${FILENAME} -> s3://${BUCKET}/${FILENAME}"
              aws s3 cp "$FILE" "s3://${BUCKET}/${FILENAME}" \
                --endpoint-url "$ENDPOINT" \
                --no-progress \
                --no-multipart
          done

          echo "Upload complete."
