name: Build Oracle OCI ARM64 (qemu-efi) Image

on:
  workflow_dispatch:
  schedule:
    - cron: '00 03 * * 1'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            system-features = kvm nixos-test benchmark big-parallel

      - name: Build image (qemu-efi)
        run: |
          set -euo pipefail

          nix build .#oracle --print-build-logs

          echo "== Build output (result symlink) =="
          readlink -f result || true
          ls -lah result

          # Produce a deterministic release artifact in the workspace.
          # Depending on nixpkgs version, `result` may be a file OR a directory.
          if [ -d result ]; then
            echo "result is a directory; tarring contents"
            tar -C result -czf nixos-oracle-qemu-efi.tar.gz .
            echo "ARTIFACT=nixos-oracle-qemu-efi.tar.gz" >> "$GITHUB_ENV"
          else
            echo "result is a file; copying"
            cp -v result nixos-oracle-qemu-efi.img
            gzip -f nixos-oracle-qemu-efi.img
            echo "ARTIFACT=nixos-oracle-qemu-efi.img.gz" >> "$GITHUB_ENV"
          fi

          echo "== Workspace artifacts =="
          ls -lah

      - name: Get date
        run: |
          echo "DATE=$(date --rfc-3339=date)" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARTIFACT }}
          tag_name: v${{ env.DATE }}
