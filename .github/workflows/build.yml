name: Build OCI ARM64 Image

on:
  workflow_dispatch: 
  schedule:
    - cron: '00 03 * * 1'
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          system-features = kvm nixos-test benchmark big-parallel
          
    - name: Build QCOW2 Image
      run: |
        nix build .#oracle --print-build-logs

    - name: Get date
      run: |
        echo "DATE=$(date --rfc-3339=date)" >> ${GITHUB_ENV}
    
    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: nixos-oracle-qcow2.zip
        tag_name: v${{env.DATE}}
